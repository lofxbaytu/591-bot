<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>正在開啟 591 App...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #ff6600;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ff6600;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>正在為您打開 591 App...</h2>
        <p>若系統沒有自動跳轉，請點選下方按鈕直接前往網頁版：</p>
        <a id="fallback-btn" class="btn" href="#">前往網頁版</a>
    </div>

    <script>
        // Parse query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const scheme = urlParams.get('scheme') || 'tw591'; // tw591, tj591, house591
        const action = urlParams.get('action') || 'rentDetail'; // rentDetail, detail
        const id = urlParams.get('id');
        
        const fallbackUrl = id ? `https://rent.591.com.tw/rent-detail-${id}.html` : 'https://rent.591.com.tw';
        document.getElementById('fallback-btn').href = fallbackUrl;

        if (id) {
            // Attempt to trigger the App custom scheme link
            const appUrl = `${scheme}://${action}?id=${id}`;
            
            // Try opening in App
            window.location.href = appUrl;
            
            // Fallback redirect after a short timeout if App is not installed
            setTimeout(() => {
                window.location.href = fallbackUrl;
            }, 2000);
        } else {
            window.location.href = fallbackUrl;
        }
    </script>
</body>
</html>
