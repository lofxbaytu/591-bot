<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>開啟 591 App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 90%;
            width: 320px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 15px;
        }
        h2 {
            margin-top: 0;
            color: #222;
            font-size: 20px;
        }
        p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            margin: 15px 0;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
            text-align: center;
        }
        .btn-primary {
            background-color: #ff6600;
            color: white;
        }
        .btn-primary:hover {
            background-color: #e65c00;
        }
        .btn-outline {
            border: 1px solid #ced4da;
            color: #6c757d;
        }
        .btn-outline:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <h2>請選擇開啟方式</h2>
        <p>請點選下方按鈕直接喚起您手機中的 591 App：</p>
        
        <a id="app-btn" class="btn btn-primary" href="#">📱 點此開啟 591 App</a>
        <a id="web-btn" class="btn btn-outline" href="#">🌐 前往 591 網頁版</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        
        const fallbackUrl = id ? `https://rent.591.com.tw/rent-detail-${id}.html` : 'https://rent.591.com.tw';
        document.getElementById('web-btn').href = fallbackUrl;

        if (id) {
            // Detect user OS and assign the correct custom scheme
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            const isAndroid = /android/i.test(userAgent);
            
            let appUrl = `house591://detail?id=${id}`; // fallback
            
            if (isIOS) {
                appUrl = `tw591://rentDetail?id=${id}`;
            } else if (isAndroid) {
                appUrl = `tj591://rentDetail?id=${id}`;
            }
            
            document.getElementById('app-btn').href = appUrl;

            // Attempt to auto-open on page load
            window.location.href = appUrl;
        } else {
            window.location.href = fallbackUrl;
        }
    </script>
</body>
</html>
